name: UI Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ui-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      BASE_URL: https://www.onliner.by

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run quality gates
        run: npm run check

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ]; then
            npm run report:allure
          fi

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure Pages artifact
        if: always() && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && hashFiles('allure-report/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  deploy-allure-report:
    if: always() && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: playwright
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
